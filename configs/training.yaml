# RL Training Configuration
# ── v4: 5M-step retrain, rebalanced biomass/mortality rewards ───────────────

# === PPO HYPERPARAMETERS ===
ppo:
  # Slower learning rate → more stable convergence over 1M steps.
  # Think of it like adjusting a dial slowly vs. yanking it hard.
  learning_rate: 0.0001

  # 4096 steps collected before each brain update (was 2048).
  # More diverse experience = more stable gradient, less variance.
  n_steps: 4096

  # Larger mini-batch → smoother gradient updates.
  batch_size: 256

  # 15 passes through the collected data per update (was 10).
  n_epochs: 15

  # Future discount factor — at 0.995, rewards 96 steps away
  # are worth 0.995^96 = 62% (vs 0.99^96 = 38% before).
  # Our episode is 96 steps, so we NEED to value long-term rewards.
  gamma: 0.995

  gae_lambda: 0.95                 # GAE parameter (unchanged)
  clip_range: 0.2                  # PPO clip range (unchanged)

  # Lower entropy coef = less random exploration after initial learning.
  # Helps policy stabilize once it has found a good strategy.
  ent_coef: 0.005

  vf_coef: 0.5                     # Value function coefficient (unchanged)
  max_grad_norm: 0.5

# === NETWORK ARCHITECTURE ===
policy:
  type: "MlpPolicy"
  net_arch:
    # Doubled layer sizes: 64→128. The BSF environment has complex
    # non-linear interactions (e.g. feed × temperature × moisture → growth).
    # A wider network can capture these relationships better.
    pi: [128, 128]                 # Policy network (what action to take)
    vf: [128, 128]                 # Value network (how good is this state)

# === TRAINING SETTINGS ===
training:
  total_timesteps: 5000000         # 5M steps ≈ 52,000 full episodes
  eval_freq: 50000                 # Evaluate every 50k steps
  n_eval_episodes: 10              # Episodes per evaluation
  save_freq: 500000                # Save checkpoint every 500k steps
  log_interval: 10                 # Log every N updates

# === REWARD WEIGHTS ===
reward:
  # biomass_gain raised 1.0→2.0: make growing larvae the PRIMARY objective.
  # Previously the agent could ignore growth and still get decent reward
  # by just keeping larvae alive. Now growth is equally important.
  biomass_gain: 2.0

  feed_waste: 0.5

  # mortality lowered 5.0→2.5: deaths are still bad, but not so scary
  # that the agent starves larvae to avoid the penalty. The agent was
  # under-feeding to dodge the -5 hit — now the cost is more balanced
  # against the +2 biomass reward it earns by actually growing them.
  mortality: 2.5

  resource_cost: 0.1               # δ: Water, energy costs (unchanged)

# === PATHS ===
paths:
  model_save_dir: "outputs/models"
  log_dir: "outputs/logs"
  tensorboard_dir: "outputs/logs/tensorboard"
